name: Package MCPB

on:
  push:
    tags:
      - 'v*' # Triggers on version tags (e.g., v1.0.0)

jobs:
  build-and-bundle:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Build Project and Create .mcpb Archive
        run: |
          npm install
          npm run build:prod
          mcpb pack . mcp-essence-qc-${{ github.ref_name }}.mcpb

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          files: "*.mcpb"
          token: ${{ secrets.GH_TOKEN }}
